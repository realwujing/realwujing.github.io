<svg viewBox="0 0 500 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="15">
  <rect x="0" y="0" width="500" height="460" fill="white"/>

  <!-- +V rail -->
  <text x="288" y="18" font-weight="bold">+V</text>
  <line x1="300" y1="24" x2="300" y2="70" stroke="black" stroke-width="2"/>

  <!-- R2 : collector load resistor -->
  <rect x="288" y="70" width="24" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="322" y="100">R2</text>
  <line x1="300" y1="120" x2="300" y2="160" stroke="black" stroke-width="2"/>

  <!-- Node C -->
  <circle cx="300" cy="160" r="4" fill="black"/>
  <text x="308" y="182" font-weight="bold">C点</text>

  <!-- Output branch: C3 + Uo -->
  <line x1="300" y1="160" x2="365" y2="160" stroke="black" stroke-width="2"/>
  <line x1="372" y1="148" x2="372" y2="172" stroke="black" stroke-width="2"/>
  <line x1="380" y1="148" x2="380" y2="172" stroke="black" stroke-width="2"/>
  <text x="365" y="132" font-size="13">C3</text>
  <line x1="380" y1="160" x2="430" y2="160" stroke="black" stroke-width="2"/>
  <polygon points="430,154 444,160 430,166" fill="black"/>
  <text x="448" y="165">Uo</text>

  <!-- Feedback bus at node C going left -->
  <line x1="300" y1="160" x2="150" y2="160" stroke="black" stroke-width="2"/>

  <!-- R1 vertical branch -->
  <line x1="150" y1="160" x2="150" y2="190" stroke="black" stroke-width="2"/>
  <rect x="138" y="190" width="24" height="45" fill="none" stroke="black" stroke-width="2"/>
  <line x1="150" y1="235" x2="150" y2="280" stroke="black" stroke-width="2"/>
  <text x="166" y="216">R1</text>

  <!-- C2 vertical branch, parallel to R1 (bus tying tops and bottoms together) -->
  <line x1="150" y1="160" x2="205" y2="160" stroke="black" stroke-width="2"/>
  <line x1="205" y1="160" x2="205" y2="250" stroke="black" stroke-width="2"/>
  <line x1="195" y1="250" x2="215" y2="250" stroke="black" stroke-width="2"/>
  <line x1="195" y1="258" x2="215" y2="258" stroke="black" stroke-width="2"/>
  <line x1="205" y1="258" x2="205" y2="280" stroke="black" stroke-width="2"/>
  <text x="220" y="254" font-size="13">C2</text>
  <line x1="150" y1="280" x2="205" y2="280" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="160" r="3" fill="black"/>
  <circle cx="150" cy="280" r="3" fill="black"/>

  <!-- down to node B -->
  <line x1="175" y1="280" x2="175" y2="300" stroke="black" stroke-width="2"/>
  <circle cx="175" cy="280" r="3" fill="black"/>

  <!-- Node B -->
  <circle cx="175" cy="300" r="4" fill="black"/>
  <text x="185" y="325" font-weight="bold">B点</text>

  <!-- Input branch: Ui -> C1 -> B -->
  <line x1="175" y1="300" x2="100" y2="300" stroke="black" stroke-width="2"/>
  <line x1="92" y1="288" x2="92" y2="312" stroke="black" stroke-width="2"/>
  <line x1="84" y1="288" x2="84" y2="312" stroke="black" stroke-width="2"/>
  <text x="78" y="282" font-size="13">C1</text>
  <line x1="84" y1="300" x2="40" y2="300" stroke="black" stroke-width="2"/>
  <circle cx="40" cy="300" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="8" y="290">Ui</text>

  <!-- IB arrow label -->
  <polygon points="205,294 218,300 205,306" fill="black"/>
  <text x="200" y="290" font-size="12">IB</text>

  <!-- Base lead to transistor bar -->
  <line x1="175" y1="300" x2="235" y2="300" stroke="black" stroke-width="2"/>
  <line x1="235" y1="285" x2="235" y2="315" stroke="black" stroke-width="3"/>

  <!-- Collector lead -->
  <line x1="235" y1="288" x2="262" y2="273" stroke="black" stroke-width="2"/>
  <line x1="262" y1="273" x2="262" y2="160" stroke="black" stroke-width="2"/>
  <line x1="262" y1="160" x2="300" y2="160" stroke="black" stroke-width="2"/>
  <text x="268" y="220" font-size="12">IC</text>

  <!-- Emitter lead with NPN arrow (points away from base) -->
  <line x1="235" y1="312" x2="262" y2="327" stroke="black" stroke-width="2"/>
  <polygon points="253,317 262,327 249,325" fill="black"/>
  <line x1="262" y1="327" x2="262" y2="400" stroke="black" stroke-width="2"/>

  <!-- Transistor envelope -->
  <circle cx="250" cy="300" r="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="292" y="286" font-weight="bold">VT1</text>
  <text x="292" y="302" font-size="11" fill="#555">NPN</text>

  <text x="272" y="378" font-weight="bold">E点</text>

  <!-- Ground symbol -->
  <line x1="238" y1="400" x2="286" y2="400" stroke="black" stroke-width="2"/>
  <line x1="246" y1="408" x2="278" y2="408" stroke="black" stroke-width="2"/>
  <line x1="254" y1="416" x2="270" y2="416" stroke="black" stroke-width="2"/>
  <text x="290" y="410" font-size="12" fill="#555">GND</text>
</svg>

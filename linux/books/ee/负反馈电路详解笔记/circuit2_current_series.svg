<svg viewBox="0 0 500 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="15">
  <rect x="0" y="0" width="500" height="460" fill="white"/>

  <!-- +V rail -->
  <text x="205" y="15" font-weight="bold">+V</text>
  <line x1="180" y1="22" x2="330" y2="22" stroke="black" stroke-width="2"/>

  <!-- R1 : base bias resistor (left branch) -->
  <line x1="180" y1="22" x2="180" y2="60" stroke="black" stroke-width="2"/>
  <rect x="168" y="60" width="24" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="196" y="88">R1</text>
  <line x1="180" y1="105" x2="180" y2="230" stroke="black" stroke-width="2"/>

  <!-- R2 : collector load resistor (right branch) -->
  <line x1="300" y1="22" x2="300" y2="55" stroke="black" stroke-width="2"/>
  <rect x="288" y="55" width="24" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="316" y="85">R2</text>
  <line x1="300" y1="105" x2="300" y2="150" stroke="black" stroke-width="2"/>

  <!-- Node C -->
  <circle cx="300" cy="150" r="4" fill="black"/>
  <text x="308" y="172" font-weight="bold">C点</text>

  <!-- Output branch: Co + Uo -->
  <line x1="300" y1="150" x2="360" y2="150" stroke="black" stroke-width="2"/>
  <line x1="367" y1="138" x2="367" y2="162" stroke="black" stroke-width="2"/>
  <line x1="375" y1="138" x2="375" y2="162" stroke="black" stroke-width="2"/>
  <text x="360" y="122" font-size="13">C4</text>
  <line x1="375" y1="150" x2="430" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="430,144 444,150 430,156" fill="black"/>
  <text x="448" y="155">Uo</text>

  <!-- Node B (junction of R1 bias, Ui/C1, base lead) -->
  <circle cx="180" cy="230" r="4" fill="black"/>
  <text x="188" y="255" font-weight="bold">B点</text>

  <!-- Input branch: Ui -> C1 -> B -->
  <line x1="180" y1="230" x2="100" y2="230" stroke="black" stroke-width="2"/>
  <line x1="92" y1="218" x2="92" y2="242" stroke="black" stroke-width="2"/>
  <line x1="84" y1="218" x2="84" y2="242" stroke="black" stroke-width="2"/>
  <text x="78" y="212" font-size="13">C1</text>
  <line x1="84" y1="230" x2="40" y2="230" stroke="black" stroke-width="2"/>
  <circle cx="40" cy="230" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="8" y="220">Ui</text>

  <!-- IB arrow -->
  <polygon points="150,224 163,230 150,236" fill="black"/>
  <text x="145" y="218" font-size="12">IB</text>

  <!-- Base lead into transistor bar -->
  <line x1="180" y1="230" x2="235" y2="230" stroke="black" stroke-width="2"/>
  <line x1="235" y1="215" x2="235" y2="245" stroke="black" stroke-width="3"/>

  <!-- Collector lead -->
  <line x1="235" y1="218" x2="262" y2="203" stroke="black" stroke-width="2"/>
  <line x1="262" y1="203" x2="262" y2="150" stroke="black" stroke-width="2"/>
  <line x1="262" y1="150" x2="300" y2="150" stroke="black" stroke-width="2"/>
  <text x="268" y="185" font-size="12">IC</text>

  <!-- Emitter lead with NPN arrow -->
  <line x1="235" y1="242" x2="262" y2="257" stroke="black" stroke-width="2"/>
  <polygon points="253,247 262,257 249,255" fill="black"/>
  <line x1="262" y1="257" x2="262" y2="300" stroke="black" stroke-width="2"/>
  <text x="268" y="280" font-size="12">IE</text>

  <!-- Transistor envelope -->
  <circle cx="250" cy="230" r="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="292" y="216" font-weight="bold">VT1</text>
  <text x="292" y="232" font-size="11" fill="#555">NPN</text>

  <!-- Node E -->
  <circle cx="262" cy="300" r="4" fill="black"/>
  <text x="272" y="298" font-weight="bold">E点</text>

  <!-- R3 : emitter feedback resistor -->
  <rect x="250" y="300" width="24" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="278" y="326" font-weight="bold">R3</text>
  <text x="278" y="342" font-size="11" fill="#555">反馈电阻</text>
  <line x1="262" y1="345" x2="262" y2="385" stroke="black" stroke-width="2"/>

  <!-- Ground symbol -->
  <line x1="238" y1="385" x2="286" y2="385" stroke="black" stroke-width="2"/>
  <line x1="246" y1="393" x2="278" y2="393" stroke="black" stroke-width="2"/>
  <line x1="254" y1="401" x2="270" y2="401" stroke="black" stroke-width="2"/>
  <text x="290" y="395" font-size="12" fill="#555">GND</text>
</svg>

<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="15">
  <rect x="0" y="0" width="700" height="460" fill="white"/>

  <!-- +V rail -->
  <text x="360" y="12" font-weight="bold">+V</text>
  <line x1="242" y1="22" x2="610" y2="22" stroke="black" stroke-width="2"/>

  <!-- ===== Stage 1 ===== -->
  <!-- R1: collector load for VT1 AND base-bias source for VT2 (double duty, direct coupling) -->
  <line x1="242" y1="22" x2="242" y2="55" stroke="black" stroke-width="2"/>
  <rect x="230" y="55" width="24" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="258" y="82">R1</text>
  <text x="258" y="98" font-size="11" fill="#555">(集电极负载</text>
  <text x="258" y="112" font-size="11" fill="#555">＋VT2偏置)</text>
  <line x1="242" y1="100" x2="242" y2="140" stroke="black" stroke-width="2"/>

  <!-- Node C1 (VT1 collector) -->
  <circle cx="242" cy="140" r="4" fill="black"/>
  <text x="250" y="163" font-weight="bold">C1点</text>

  <!-- direct coupling wire to B2 (no capacitor) -->
  <line x1="242" y1="140" x2="400" y2="140" stroke="black" stroke-width="2"/>
  <text x="270" y="133" font-size="11" fill="#555">直接耦合(无电容)</text>
  <line x1="400" y1="140" x2="400" y2="270" stroke="black" stroke-width="2"/>

  <!-- Node B1 -->
  <circle cx="160" cy="270" r="4" fill="black"/>
  <text x="118" y="295" font-weight="bold">B1点</text>

  <!-- Input branch -->
  <line x1="160" y1="270" x2="92" y2="270" stroke="black" stroke-width="2"/>
  <line x1="84" y1="258" x2="84" y2="282" stroke="black" stroke-width="2"/>
  <line x1="76" y1="258" x2="76" y2="282" stroke="black" stroke-width="2"/>
  <text x="70" y="252">C1</text>
  <line x1="76" y1="270" x2="40" y2="270" stroke="black" stroke-width="2"/>
  <circle cx="40" cy="270" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="8" y="260">Ui</text>

  <!-- R2 final approach into B1 (from below) -->
  <line x1="160" y1="320" x2="160" y2="270" stroke="black" stroke-width="2"/>

  <!-- Base lead + bar -->
  <line x1="160" y1="270" x2="215" y2="270" stroke="black" stroke-width="2"/>
  <line x1="215" y1="255" x2="215" y2="285" stroke="black" stroke-width="3"/>

  <!-- Collector lead -->
  <line x1="215" y1="258" x2="242" y2="243" stroke="black" stroke-width="2"/>
  <line x1="242" y1="243" x2="242" y2="140" stroke="black" stroke-width="2"/>

  <!-- Emitter lead (NPN arrow), straight to ground (no resistor in this circuit) -->
  <line x1="215" y1="282" x2="242" y2="297" stroke="black" stroke-width="2"/>
  <polygon points="233,287 242,297 229,295" fill="black"/>
  <line x1="242" y1="297" x2="242" y2="330" stroke="black" stroke-width="2"/>
  <text x="250" y="302" font-weight="bold">E1点</text>

  <!-- Transistor envelope VT1 -->
  <circle cx="230" cy="270" r="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="196" y="240" font-weight="bold">VT1</text>

  <!-- ground for stage 1 -->
  <line x1="220" y1="330" x2="264" y2="330" stroke="black" stroke-width="2"/>
  <line x1="228" y1="338" x2="256" y2="338" stroke="black" stroke-width="2"/>
  <line x1="236" y1="346" x2="248" y2="346" stroke="black" stroke-width="2"/>

  <!-- ===== Stage 2 ===== -->
  <!-- Node B2 : biased directly by C1点 via R1, no separate bias resistor -->
  <circle cx="400" cy="270" r="4" fill="black"/>
  <text x="356" y="295" font-weight="bold">B2点</text>

  <!-- Base lead + bar -->
  <line x1="400" y1="270" x2="455" y2="270" stroke="black" stroke-width="2"/>
  <line x1="455" y1="255" x2="455" y2="285" stroke="black" stroke-width="3"/>

  <!-- R3: collector load for VT2 -->
  <line x1="482" y1="22" x2="482" y2="55" stroke="black" stroke-width="2"/>
  <rect x="470" y="55" width="24" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="498" y="82">R3</text>
  <line x1="482" y1="100" x2="482" y2="140" stroke="black" stroke-width="2"/>

  <!-- Node C2 (VT2 collector = output node) -->
  <circle cx="482" cy="140" r="4" fill="black"/>
  <text x="490" y="163" font-weight="bold">C2点</text>

  <!-- Output branch -->
  <line x1="482" y1="140" x2="540" y2="140" stroke="black" stroke-width="2"/>
  <line x1="547" y1="128" x2="547" y2="152" stroke="black" stroke-width="2"/>
  <line x1="555" y1="128" x2="555" y2="152" stroke="black" stroke-width="2"/>
  <text x="543" y="122" font-size="13">C4</text>
  <line x1="555" y1="140" x2="605" y2="140" stroke="black" stroke-width="2"/>
  <polygon points="605,134 619,140 605,146" fill="black"/>
  <text x="623" y="145">Uo</text>

  <!-- Collector lead -->
  <line x1="455" y1="258" x2="482" y2="243" stroke="black" stroke-width="2"/>
  <line x1="482" y1="243" x2="482" y2="140" stroke="black" stroke-width="2"/>

  <!-- Emitter lead (NPN arrow) -->
  <line x1="455" y1="282" x2="482" y2="297" stroke="black" stroke-width="2"/>
  <polygon points="473,287 482,297 469,295" fill="black"/>
  <line x1="482" y1="297" x2="482" y2="310" stroke="black" stroke-width="2"/>

  <!-- Transistor envelope VT2 -->
  <circle cx="470" cy="270" r="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="436" y="240" font-weight="bold">VT2</text>

  <!-- Node E2 -->
  <circle cx="482" cy="310" r="4" fill="black"/>
  <text x="492" y="306">E2点</text>

  <!-- short wire down to R4/C3 shared start -->
  <line x1="482" y1="310" x2="482" y2="318" stroke="black" stroke-width="2"/>

  <!-- R4: stage-2 emitter resistor -->
  <rect x="470" y="318" width="24" height="35" fill="none" stroke="black" stroke-width="2"/>
  <text x="498" y="340">R4</text>
  <line x1="482" y1="353" x2="482" y2="365" stroke="black" stroke-width="2"/>

  <!-- C3 bypass, parallel to R4 -->
  <line x1="482" y1="318" x2="522" y2="318" stroke="black" stroke-width="2"/>
  <line x1="522" y1="318" x2="522" y2="340" stroke="black" stroke-width="2"/>
  <line x1="513" y1="340" x2="531" y2="340" stroke="black" stroke-width="2"/>
  <line x1="513" y1="347" x2="531" y2="347" stroke="black" stroke-width="2"/>
  <text x="534" y="315" font-size="12">C3</text>
  <line x1="522" y1="347" x2="522" y2="365" stroke="black" stroke-width="2"/>
  <line x1="482" y1="365" x2="522" y2="365" stroke="black" stroke-width="2"/>

  <!-- ground for stage 2 -->
  <line x1="502" y1="365" x2="502" y2="375" stroke="black" stroke-width="2"/>
  <line x1="480" y1="375" x2="524" y2="375" stroke="black" stroke-width="2"/>
  <line x1="488" y1="383" x2="516" y2="383" stroke="black" stroke-width="2"/>
  <line x1="496" y1="391" x2="508" y2="391" stroke="black" stroke-width="2"/>

  <!-- ===== R2 : cross-stage feedback, returns to B1 (parallel!) ===== -->
  <line x1="482" y1="310" x2="650" y2="310" stroke="black" stroke-width="2"/>
  <line x1="650" y1="310" x2="650" y2="400" stroke="black" stroke-width="2"/>
  <line x1="650" y1="400" x2="100" y2="400" stroke="black" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="320" stroke="black" stroke-width="2"/>
  <line x1="100" y1="320" x2="160" y2="320" stroke="black" stroke-width="2"/>
  <text x="565" y="270" font-weight="bold">R2</text>
  <text x="565" y="284" font-size="11" fill="#555">(反馈＋VT1偏置)</text>
</svg>

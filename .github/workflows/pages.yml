name: Pages

on:
  push:
    branches:
      - main
      - mkdoc

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches
        run: git fetch origin main mkdoc

      - name: Checkout content from main
        run: git checkout origin/main -- .

      - name: Copy content to docs
        run: |
          mkdir -p docs
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='docs' --exclude='site' \
            --exclude='__pycache__' --exclude='node_modules' \
            --include='*/' \
            --include='*.md' --include='*.png' --include='*.jpg' \
            --include='*.jpeg' --include='*.gif' --include='*.svg' \
            --include='*.webp' --exclude='*' \
            ./ docs/

      - name: Get build config from mkdoc branch
        run: git checkout origin/mkdoc -- mkdocs.yml plantuml_fence.py requirements.txt overrides/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare docs
        run: |
          find docs -type d | while read dir; do
            if [ ! -f "$dir/index.md" ] && [ ! -f "$dir/README.md" ]; then
              md_files=$(ls "$dir"/*.md 2>/dev/null | grep -v '/index.md$' | sed 's|.*/||')
              subdirs=$(ls -d "$dir"/*/ 2>/dev/null | sed 's|.*/||' | sed 's|/||')
              if [ -n "$md_files$subdirs" ]; then
                dir_name=$(basename "$dir")
                echo "# $dir_name" > "$dir/index.md"
                echo "" >> "$dir/index.md"
                for d in $subdirs; do
                  echo "- [$d]($d/)" >> "$dir/index.md"
                done
                for f in $md_files; do
                  title=$(echo "$f" | sed 's/\.md$//')
                  echo "- [$title]($f)" >> "$dir/index.md"
                done
              fi
            fi
          done
          find docs -name 'README.md' | while read f; do mv "$f" "$(dirname "$f")/index.md"; done

      - name: Build site
        run: |
          export PYTHONPATH=.
          mkdocs build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site